<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>edgescribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
      </div>
      <span>edgescribe</span>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT: Controls -->
    <div class="panel-left">

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          Upload
        </button>
        <button class="mode-tab" data-mode="mic">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
          Record
        </button>
        <button class="mode-tab" data-mode="history">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><polyline points="12 7 12 12 16 14"/></svg>
          History
        </button>
      </div>

      <!-- File upload -->
      <div id="fileMode">
        <div class="upload-zone" id="dropZone">
          <div class="upload-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          </div>
          <div class="upload-text">
            <span class="upload-label" id="dropLabel">Drop file or click to browse</span>
            <span class="upload-hint">mp3, wav, flac, m4a, mp4, mkv, avi</span>
          </div>
          <input type="file" id="fileInput" hidden multiple accept=".mp3,.wav,.flac,.m4a,.ogg,.aac,.opus,.webm,.mp4,.mov,.mkv,.avi,.wmv">
        </div>
      </div>

      <!-- Mic -->
      <div id="micMode" class="hidden">
        <div class="mic-panel">
          <button class="mic-btn" id="micBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            <div class="mic-pulse"></div>
          </button>
          <div class="mic-info">
            <span id="micStatus">Click to start</span>
            <span class="mic-timer hidden" id="micTimer">00:00</span>
          </div>
          <canvas id="waveCanvas" width="400" height="40"></canvas>
        </div>
      </div>

      <!-- History -->
      <div id="historyMode" class="hidden">
        <div class="history-panel">
          <div class="history-controls">
            <button id="refreshBtn" class="history-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"/></svg>
              Refresh
            </button>
          </div>
          <div class="jobs-list" id="jobsList">
            <p class="loading">Loading jobs...</p>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="settings">
        <div class="field">
          <label>Language</label>
          <select id="language">
            <option value="auto">Auto-detect</option>
            <option value="ru">Russian</option>
            <option value="en">English</option>
            <option value="tk">Turkmence</option>
            <option value="tr">Turkce</option>
            <option value="de">Deutsch</option>
            <option value="fr">Francais</option>
            <option value="es">Espanol</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
          </select>
        </div>
        <div class="field">
          <label>Speakers</label>
          <select id="speakers">
            <option value="0">Off</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div class="field">
          <label>Timestamps</label>
          <select id="timestamps">
            <option value="auto">Per phrase</option>
            <option value="none">None</option>
            <option value="10">Every 10s</option>
            <option value="30">Every 30s</option>
          </select>
        </div>
        <div class="field">
          <label>Model</label>
          <select id="model">
            <option value="large-v3-turbo">turbo</option>
            <option value="large-v3">large-v3</option>
            <option value="medium">medium</option>
            <option value="small">small</option>
            <option value="base">base</option>
          </select>
        </div>
      </div>

      <button class="btn-go" id="submitBtn" disabled>Transcribe</button>

      <!-- Progress -->
      <div class="progress-wrap hidden" id="progressWrap">
        <div class="progress-info">
          <span id="progressLabel">Preparing...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-meta" id="progressMeta"></div>
      </div>

      <div class="alert hidden" id="alert"></div>
    </div>

    <!-- RIGHT: Result -->
    <div class="panel-right">
      <div class="result-placeholder" id="resultPlaceholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>Upload a file or record audio to transcribe</p>
      </div>

      <div class="result hidden" id="resultCard">
        <div class="result-tabs">
          <button class="tab active" data-tab="txt">Text</button>
          <button class="tab" data-tab="srt">SRT</button>
          <div class="tab-actions">
            <button class="action-btn" id="copyBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              <span>Copy</span>
            </button>
            <button class="action-btn" id="downloadTxt">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
              <span>.txt</span>
            </button>
            <button class="action-btn" id="downloadSrt">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
              <span>.srt</span>
            </button>
          </div>
        </div>
        <textarea id="resultTxt" placeholder="Transcription will appear here. You can edit the text."></textarea>
        <textarea id="resultSrt" class="hidden" placeholder="SRT subtitles will appear here."></textarea>
      </div>
    </div>

  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
